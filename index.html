<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF - Cafeteria Food</title>

<style>
body { 
  margin:0; 
  font-family: Arial,sans-serif; 
  background: linear-gradient(-45deg, orange, #ff7a00, #007bff, blue);
  background-size: 400% 400%;
  animation: gradientFlow 15s ease infinite;
  color: white;
}

header { 
  background: linear-gradient(-45deg, orange, #ff7a00, #007bff, blue);
  background-size: 400% 400%;
  animation: gradientFlow 15s ease infinite;
  color:white; 
  padding:15px; 
  text-align:center; 
  position:sticky; 
  top:0; 
}

/* animation */
@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  25% { background-position: 50% 100%; }
  50% { background-position: 100% 50%; }
  75% { background-position: 50% 0%; }
  100% { background-position: 0% 50%; }
}

.header-content {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo {
  width:35px;
  height:35px;
}

#backBtn, #basketBtn { 
  font-size:16px; 
  padding:8px 12px; 
  border-radius:8px; 
  border:none; 
  cursor:pointer; 
  background:white; 
  color:#4CAF50; 
  margin:5px; 
}

.container { 
  padding:20px; 
  text-align:center; 
}

button.actionBtn { 
  width:90%; 
  max-width:300px; 
  padding:15px; 
  margin:10px auto; 
  font-size:18px; 
  border:none; 
  border-radius:12px; 
  background:#4CAF50; 
  color:white; 
  display:block; 
  cursor:pointer; 
}

input { 
  width:90%; 
  max-width:300px; 
  padding:15px; 
  font-size:18px; 
  border-radius:12px; 
  border:1px solid #ccc; 
  margin:10px auto; 
  text-align:center; 
}

.card { 
  background:white; 
  color:black;
  margin:15px auto; 
  border-radius:12px; 
  overflow:hidden; 
  width:95%; 
  max-width:350px; 
  box-shadow:0 4px 10px rgba(0,0,0,0.1); 
}

.card img { width:100%; height:180px; object-fit:cover; }

.card h3 { margin:10px; }

.price { color:#4CAF50; font-weight:bold; }

#basketPopup { 
  position:fixed; 
  bottom:0; 
  left:0; 
  right:0; 
  background:white; 
  padding:20px; 
  display:none; 
  max-height:60%; 
  overflow-y:auto; 
  color:black;
}

.item { margin:10px 0; }

#successMsg { 
  display:none; 
  color:green; 
  font-weight:bold; 
  margin-top:15px; 
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" class="logo">
    <h2>CF</h2>
  </div>
  <button id="backBtn" onclick="goBack()">⬅ Back</button>
  <button id="basketBtn" onclick="toggleBasket()">🛒 Basket</button>
</header>

<div class="container" id="tableScreen">
<h3>ENTER YOUR CLASS NAME <br>
eg. 3E</h3>
<input type="text" id="tableInput" placeholder="e.g. A12">
<button class="actionBtn" onclick="saveTable()">Continue</button>
</div>

<div class="container" id="mainMenu" style="display:none;">
<button class="actionBtn" onclick="selectMeal('breakfast')">Breakfast</button>
<button class="actionBtn" onclick="selectMeal('lunch')">Lunch</button>
</div>

<div class="container" id="foodMenu" style="display:none;">
<div id="foodList"></div>
</div>

<div id="basketPopup">
<h3>Your Basket</h3>
<div id="basketItems"></div>
<h3 id="total"></h3>
<button class="actionBtn" onclick="placeOrder()">Order</button>
<div id="successMsg">Order Successful ✅</div>
</div>

function saveTable(){
const input=document.getElementById("tableInput").value.trim();
if(!input) return alert("ENTER YOUR CLASS NAME eg. 3E");
tableNumber=input;
document.getElementById("tableScreen").style.display="none";
document.getElementById("mainMenu").style.display="block";
currentScreen="menu";
}

function selectMeal(meal){
document.getElementById("mainMenu").style.display="none";
document.getElementById("foodMenu").style.display="block";
const list=document.getElementById("foodList");
list.innerHTML="";
menus[meal].forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="${item.img}">
<h3>${item.name}</h3>
<div class="price">₾${item.price}</div>
<button class="actionBtn" onclick='addToBasket(${JSON.stringify(item)})'>Add to Basket</button>
`;
list.appendChild(card);
});
currentScreen="food";
}

function addToBasket(item){
basket.push(item);
alert(item.name+" added 🛒");
}

function toggleBasket(){
if(basketOpen){
document.getElementById("basketPopup").style.display="none";
basketOpen=false;
document.getElementById("successMsg").style.display="none";
} else {
const container=document.getElementById("basketItems");
container.innerHTML="";
let total=0;
basket.forEach(item=>{
total+=item.price;
const div=document.createElement("div");
div.className="item";
div.innerText=item.name+" - ₾"+item.price;
container.appendChild(div);
});
document.getElementById("total").innerText="Total: ₾"+total;
document.getElementById("basketPopup").style.display="block";
basketOpen=true;
currentScreen="basket";
document.getElementById("successMsg").style.display="none";
}
}

function placeOrder(){
if(basket.length===0) {
alert("Basket is empty");
return;
}
document.getElementById("successMsg").style.display="block";
basket=[];
document.getElementById("basketItems").innerHTML="";
document.getElementById("total").innerText="Total: ₾0";
}

function goBack(){
document.getElementById("tableScreen").style.display="block";
document.getElementById("mainMenu").style.display="none";
document.getElementById("foodMenu").style.display="none";
document.getElementById("basketPopup").style.display="none";
basket=[];
basketOpen=false;
currentScreen="table";
document.getElementById("successMsg").style.display="none";
}
</script>

</body>
</html>
